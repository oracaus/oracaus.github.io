# Build the Astro site and deploy to GitHub Pages (modern Actions path, not
# a gh-pages branch). Pages "Source" must be set to "GitHub Actions" in repo
# settings (one-time). Custom domain oracaus.dev comes from public/CNAME.
#
# Requires a committed package-lock.json (run `npm install` once locally and
# commit the lock) so `npm ci` resolves deterministically.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
