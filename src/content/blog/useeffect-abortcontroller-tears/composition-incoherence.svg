<svg xmlns="http://www.w3.org/2000/svg" width="700" height="304" viewBox="0 0 700 304" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Composition incoherence as a timeline, shown twice. The input is 7, then changes to 9 while a compute, square(7), is still running and produces 49. INCOHERENT: at commit the input on screen is already 9, so the frame pairs 9 with 7's output and reads 9 squared equals 49, which is false. COHERENT: the output carries a snapshot tag for the input 7 it was computed from, so the frame pairs them and reads 7 squared equals 49, true but one step late.">
  <defs>
    <marker id="ci-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="698" height="302" rx="10" fill="oklch(0.22 0.012 240)" stroke="oklch(0.3 0.014 240)"/>

  <!-- ===== Row A: INCOHERENT ===== -->
  <text x="24" y="34" font-size="12.5" fill="oklch(0.66 0.2 28)">INCOHERENT  ✗  live input, stale output</text>
  <text x="86" y="46" font-size="10" fill="oklch(0.68 0.012 240)">input changes while the async compute is still running</text>

  <!-- input lane -->
  <text x="24" y="72" font-size="11.5" fill="oklch(0.68 0.012 240)">input</text>
  <rect x="86" y="52" width="110" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="141" y="72" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">7</text>
  <rect x="196" y="52" width="300" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="346" y="72" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">9</text>

  <!-- compute lane -->
  <text x="24" y="110" font-size="11.5" fill="oklch(0.68 0.012 240)">compute</text>
  <rect x="86" y="90" width="300" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="236" y="110" font-size="12.5" text-anchor="middle" fill="oklch(0.9 0.008 240)">square(7)</text>
  <line x1="386" y1="105" x2="412" y2="105" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#ci-arrow)"/>
  <text x="420" y="110" font-size="13" fill="oklch(0.9 0.008 240)">49</text>

  <!-- commit line -->
  <line x1="446" y1="44" x2="446" y2="126" stroke="oklch(0.66 0.2 28)" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="446" y="40" font-size="10" text-anchor="middle" fill="oklch(0.66 0.2 28)">commit</text>

  <!-- frame result -->
  <text x="520" y="46" font-size="10" fill="oklch(0.68 0.012 240)">frame</text>
  <rect x="520" y="52" width="156" height="44" rx="8" fill="oklch(0.66 0.2 28)" fill-opacity="0.14" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.75"/>
  <text x="598" y="80" font-size="16" text-anchor="middle" fill="oklch(0.9 0.05 28)">9² = 49</text>

  <text x="86" y="142" font-size="11.5" fill="oklch(0.66 0.2 28)">9 is on screen now; 49 was computed from 7 — a pair that never existed</text>

  <!-- divider -->
  <line x1="24" y1="160" x2="676" y2="160" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- ===== Row B: COHERENT ===== -->
  <text x="24" y="186" font-size="12.5" fill="oklch(0.72 0.16 145)">COHERENT  ✓  output kept with the input it used</text>

  <!-- input lane -->
  <text x="24" y="224" font-size="11.5" fill="oklch(0.68 0.012 240)">input</text>
  <rect x="86" y="204" width="110" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="141" y="224" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">7</text>
  <rect x="196" y="204" width="300" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="346" y="224" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">9</text>

  <!-- compute lane -->
  <text x="24" y="262" font-size="11.5" fill="oklch(0.68 0.012 240)">compute</text>
  <rect x="86" y="242" width="300" height="30" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="180" y="262" font-size="12.5" text-anchor="middle" fill="oklch(0.9 0.008 240)">square(7)</text>
  <text x="300" y="262" font-size="11" text-anchor="middle" fill="oklch(0.7 0.13 230)">·snapshot 7</text>
  <line x1="386" y1="257" x2="412" y2="257" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#ci-arrow)"/>
  <text x="420" y="262" font-size="13" fill="oklch(0.9 0.008 240)">49</text>

  <!-- commit line -->
  <line x1="446" y1="196" x2="446" y2="278" stroke="oklch(0.72 0.16 145)" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="446" y="192" font-size="10" text-anchor="middle" fill="oklch(0.72 0.16 145)">commit</text>

  <!-- frame result -->
  <text x="520" y="198" font-size="10" fill="oklch(0.68 0.012 240)">frame</text>
  <rect x="520" y="204" width="156" height="44" rx="8" fill="oklch(0.72 0.16 145)" fill-opacity="0.14" stroke="oklch(0.72 0.16 145)" stroke-opacity="0.75"/>
  <text x="598" y="232" font-size="16" text-anchor="middle" fill="oklch(0.9 0.06 145)">7² = 49</text>

  <text x="86" y="294" font-size="11.5" fill="oklch(0.72 0.16 145)">the snapshot tag keeps 49 paired with the 7 it used — true, one step late</text>
</svg>
