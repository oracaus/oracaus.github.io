<svg xmlns="http://www.w3.org/2000/svg" width="680" height="230" viewBox="0 0 680 230" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Two rows. The top row, render, has twelve boxes, one per input tick at the feed rate; nine are red, marked wasted. The bottom row, paint, has only three boxes at the display rate, aligned under the three renders that survive. Nine of every twelve renders never reach the screen. The fix is to commit at the paint cadence, not the feed's.">
  <rect x="1" y="1" width="678" height="228" rx="10" fill="oklch(0.22 0.012 240)" stroke="oklch(0.3 0.014 240)"/>
  <text x="24" y="28" font-size="12.5" fill="oklch(0.68 0.012 240)">INPUT → RENDER  ·  re-rendering faster than you paint</text>

  <!-- render row: one commit per input tick (feed rate); kept = painted, red = wasted -->
  <text x="24" y="74" font-size="13" fill="oklch(0.94 0.008 240)">render</text>
  <text x="600" y="74" font-size="10.5" fill="oklch(0.6 0.012 240)">feed rate</text>
  <rect x="116" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="156" y="57" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <rect x="196" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="236" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="276" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="316" y="57" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <rect x="356" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="396" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="436" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="476" y="57" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <rect x="516" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>
  <rect x="556" y="57" width="28" height="26" rx="4" fill="oklch(0.66 0.2 28)" fill-opacity="0.16" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.55"/>

  <!-- connectors: only the painted renders survive -->
  <line x1="170" y1="83" x2="170" y2="133" stroke="oklch(0.34 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="330" y1="83" x2="330" y2="133" stroke="oklch(0.34 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="490" y1="83" x2="490" y2="133" stroke="oklch(0.34 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- paint row: display rate -->
  <text x="24" y="151" font-size="13" fill="oklch(0.94 0.008 240)">paint</text>
  <text x="600" y="151" font-size="10.5" fill="oklch(0.6 0.012 240)">display</text>
  <rect x="156" y="134" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <rect x="316" y="134" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <rect x="476" y="134" width="28" height="26" rx="4" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>

  <text x="349" y="189" font-size="12" text-anchor="middle" fill="oklch(0.66 0.2 28)">nine of every twelve renders never reach the screen</text>
  <text x="349" y="213" font-size="11" text-anchor="middle" fill="oklch(0.68 0.012 240)">the fix: commit at the paint cadence, not the feed's</text>
</svg>
