<svg xmlns="http://www.w3.org/2000/svg" width="680" height="216" viewBox="0 0 680 216" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="An input row of dense ticks at the feed rate above a compute row of four fit blocks, each as wide as three input ticks, so each fit outlasts three ticks. A red marker under the first block shows that tick zero's result lands three ticks late, and without coalescing the lag grows with every fit. The fix is to coalesce and recompute against the latest tick.">
  <defs>
    <marker id="lag-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="oklch(0.66 0.2 28)" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="678" height="214" rx="10" fill="oklch(0.22 0.012 240)" stroke="oklch(0.3 0.014 240)"/>
  <text x="24" y="28" font-size="12.5" fill="oklch(0.68 0.012 240)">INPUT → COMPUTE  ·  the fit falls behind the feed</text>

  <!-- input ticks: dense, at the feed rate -->
  <text x="24" y="70" font-size="13" fill="oklch(0.94 0.008 240)">input</text>
  <text x="600" y="70" font-size="10.5" fill="oklch(0.6 0.012 240)">feed rate</text>
  <line x1="120" y1="54" x2="120" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="156" y1="54" x2="156" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="192" y1="54" x2="192" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="228" y1="54" x2="228" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="264" y1="54" x2="264" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="300" y1="54" x2="300" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="336" y1="54" x2="336" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="372" y1="54" x2="372" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="408" y1="54" x2="408" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="444" y1="54" x2="444" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="480" y1="54" x2="480" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="516" y1="54" x2="516" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
  <line x1="552" y1="54" x2="552" y2="78" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>

  <!-- alignment guides at each fit boundary -->
  <line x1="120" y1="78" x2="120" y2="100" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="228" y1="78" x2="228" y2="100" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="336" y1="78" x2="336" y2="100" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="444" y1="78" x2="444" y2="100" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>
  <line x1="552" y1="78" x2="552" y2="100" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- compute: each fit spans three ticks -->
  <text x="24" y="124" font-size="13" fill="oklch(0.94 0.008 240)">compute</text>
  <text x="600" y="124" font-size="10.5" fill="oklch(0.6 0.012 240)">~58 ms/fit</text>
  <rect x="122" y="100" width="104" height="32" rx="5" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="174" y="120" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">fit</text>
  <rect x="230" y="100" width="104" height="32" rx="5" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="282" y="120" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">fit</text>
  <rect x="338" y="100" width="104" height="32" rx="5" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="390" y="120" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">fit</text>
  <rect x="446" y="100" width="104" height="32" rx="5" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="498" y="120" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">fit</text>

  <!-- the lag for the first result -->
  <line x1="120" y1="150" x2="226" y2="150" stroke="oklch(0.66 0.2 28)" stroke-width="1.4" marker-start="url(#lag-arrow)" marker-end="url(#lag-arrow)"/>
  <text x="232" y="154" font-size="10.5" fill="oklch(0.66 0.2 28)">tick 0's result lands three ticks late</text>

  <text x="340" y="180" font-size="11.5" text-anchor="middle" fill="oklch(0.66 0.2 28)">each fit outlasts three ticks; without coalescing the lag grows</text>
  <text x="340" y="202" font-size="11" text-anchor="middle" fill="oklch(0.68 0.012 240)">the fix: coalesce, recompute against the latest tick, stay one fit behind</text>
</svg>
