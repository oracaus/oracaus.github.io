<svg xmlns="http://www.w3.org/2000/svg" width="680" height="250" viewBox="0 0 680 250" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Forced reflow comparison. Expected: the geometry read forces a layout on top of the redraw's, so layout runs twice. Measured: a transform dirties no layout, so the read pulls the redraw's single layout forward and layout runs once.">
  <defs>
    <marker id="fr-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="oklch(0.68 0.012 240)" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="678" height="248" rx="10" fill="oklch(0.22 0.012 240)" stroke="oklch(0.3 0.014 240)"/>

  <!-- Row A: expected, layout twice -->
  <text x="24" y="38" font-size="12.5" fill="oklch(0.66 0.2 28)">EXPECTED  ✗  layout runs twice</text>
  <rect x="24" y="52" width="58" height="34" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="53" y="73" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">read</text>
  <line x1="84" y1="69" x2="95" y2="69" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#fr-arrow)"/>
  <rect x="98" y="52" width="80" height="34" rx="6" fill="oklch(0.66 0.2 28)" fill-opacity="0.14" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.75"/>
  <text x="138" y="73" font-size="13" text-anchor="middle" fill="oklch(0.9 0.04 28)">layout</text>
  <line x1="180" y1="69" x2="191" y2="69" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#fr-arrow)"/>
  <rect x="194" y="52" width="66" height="34" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="227" y="73" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">redraw</text>
  <line x1="262" y1="69" x2="273" y2="69" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#fr-arrow)"/>
  <rect x="276" y="52" width="80" height="34" rx="6" fill="oklch(0.66 0.2 28)" fill-opacity="0.14" stroke="oklch(0.66 0.2 28)" stroke-opacity="0.75"/>
  <text x="316" y="73" font-size="13" text-anchor="middle" fill="oklch(0.9 0.04 28)">layout</text>
  <text x="408" y="73" font-size="13" fill="oklch(0.66 0.2 28)">2 layout passes</text>

  <!-- divider -->
  <line x1="388" y1="44" x2="388" y2="204" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- Row B: measured, layout once -->
  <text x="24" y="148" font-size="12.5" fill="oklch(0.72 0.16 145)">MEASURED  ✓  transform: layout runs once</text>
  <rect x="24" y="162" width="58" height="34" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="53" y="183" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">read</text>
  <line x1="84" y1="179" x2="95" y2="179" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#fr-arrow)"/>
  <rect x="98" y="162" width="80" height="34" rx="6" fill="oklch(0.72 0.16 145)" fill-opacity="0.14" stroke="oklch(0.72 0.16 145)" stroke-opacity="0.75"/>
  <text x="138" y="183" font-size="13" text-anchor="middle" fill="oklch(0.9 0.06 145)">layout</text>
  <line x1="180" y1="179" x2="191" y2="179" stroke="oklch(0.68 0.012 240)" stroke-width="1.4" marker-end="url(#fr-arrow)"/>
  <rect x="194" y="162" width="162" height="34" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.34 0.014 240)"/>
  <text x="275" y="183" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">redraw · transform</text>
  <text x="408" y="183" font-size="13" fill="oklch(0.72 0.16 145)">1 layout pass</text>

  <!-- verdict -->
  <text x="340" y="230" font-size="11.5" text-anchor="middle" fill="oklch(0.68 0.012 240)">the read reorders the layout · it does not add one · measured 2.5 ms vs 2.2 ms</text>
</svg>
