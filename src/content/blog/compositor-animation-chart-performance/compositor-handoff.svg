<svg xmlns="http://www.w3.org/2000/svg" width="680" height="250" viewBox="0 0 680 250" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Compositor handoff. The main thread calls Element.animate once to hand the transform keyframes to the compositor, which interpolates them on its own thread over 300 ms. The main thread is left carrying only the 5 Hz redraw.">
  <defs>
    <marker id="ch-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="oklch(0.7 0.13 230)" stroke-width="1.4"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="678" height="248" rx="10" fill="oklch(0.22 0.012 240)" stroke="oklch(0.3 0.014 240)"/>

  <!-- lane headers -->
  <text x="178" y="34" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">MAIN THREAD</text>
  <text x="516" y="34" font-size="12" text-anchor="middle" fill="oklch(0.68 0.012 240)">COMPOSITOR</text>
  <line x1="345" y1="46" x2="345" y2="214" stroke="oklch(0.3 0.014 240)" stroke-width="1" stroke-dasharray="3 4"/>

  <!-- handoff box -->
  <rect x="40" y="68" width="248" height="44" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.7 0.13 230)" stroke-opacity="0.7"/>
  <text x="164" y="94" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">group.animate(keyframes)</text>

  <!-- handoff arrow -->
  <text x="333" y="58" font-size="11" text-anchor="middle" fill="oklch(0.7 0.13 230)">transform keyframes</text>
  <line x1="290" y1="90" x2="388" y2="90" stroke="oklch(0.7 0.13 230)" stroke-width="1.5" marker-end="url(#ch-arrow)"/>

  <!-- compositor box -->
  <rect x="392" y="68" width="246" height="44" rx="6" fill="oklch(0.26 0.012 240)" stroke="oklch(0.72 0.16 145)" stroke-opacity="0.7"/>
  <text x="515" y="94" font-size="13" text-anchor="middle" fill="oklch(0.9 0.008 240)">interpolate on compositor</text>

  <!-- main thread: 5 Hz baseline ticks -->
  <line x1="40" y1="170" x2="288" y2="170" stroke="oklch(0.3 0.014 240)" stroke-width="1"/>
  <g stroke="oklch(0.6 0.012 240)" stroke-width="2">
    <line x1="48" y1="161" x2="48" y2="170"/>
    <line x1="82" y1="161" x2="82" y2="170"/>
    <line x1="116" y1="161" x2="116" y2="170"/>
    <line x1="150" y1="161" x2="150" y2="170"/>
    <line x1="184" y1="161" x2="184" y2="170"/>
    <line x1="218" y1="161" x2="218" y2="170"/>
    <line x1="252" y1="161" x2="252" y2="170"/>
    <line x1="286" y1="161" x2="286" y2="170"/>
  </g>
  <text x="40" y="192" font-size="11" fill="oklch(0.68 0.012 240)">5 Hz redraw · all that's left</text>

  <!-- compositor: easing progress curve -->
  <path d="M396 184 C 470 184, 520 150, 636 138" fill="none" stroke="oklch(0.72 0.16 145)" stroke-width="2"/>
  <circle cx="636" cy="138" r="3" fill="oklch(0.72 0.16 145)"/>
  <text x="396" y="204" font-size="11" fill="oklch(0.68 0.012 240)">300 ms · GPU compositor</text>

  <!-- verdict -->
  <text x="340" y="232" font-size="11.5" text-anchor="middle" fill="oklch(0.68 0.012 240)">hands off once · the main thread goes quiet</text>
</svg>
